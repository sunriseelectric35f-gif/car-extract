name: Extract Assets.car

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  extract:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile ObjC extractor
        run: |
          clang -fobjc-arc -O2 \
            -o /tmp/extract_car \
            extract_car.m \
            -framework Foundation \
            -framework CoreGraphics \
            -framework ImageIO \
            -F /System/Library/PrivateFrameworks \
            -framework CoreUI \
            2>&1
          echo "Compile exit: $?"
          ls -lh /tmp/extract_car

      - name: Extract Tripsy
        run: |
          mkdir -p output/tripsy
          /tmp/extract_car Tripsy.car output/tripsy/ 2>&1
          echo "Files: $(ls output/tripsy/ | wc -l)"
          ls output/tripsy/ | head -30

      - name: Extract Wanderlog
        run: |
          mkdir -p output/wanderlog
          /tmp/extract_car Wanderlog.car output/wanderlog/ 2>&1
          echo "Files: $(ls output/wanderlog/ | wc -l)"
          ls output/wanderlog/ | head -30

      - name: Upload Tripsy assets
        uses: actions/upload-artifact@v4
        with:
          name: tripsy-assets
          path: output/tripsy/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Wanderlog assets
        uses: actions/upload-artifact@v4
        with:
          name: wanderlog-assets
          path: output/wanderlog/
          retention-days: 14
          if-no-files-found: warn
