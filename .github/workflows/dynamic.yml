name: Dynamic Analysis (iOS Simulator)
on:
  workflow_dispatch:

jobs:
  dynamic:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Download IPAs from release
        run: |
          gh release download v1.0-ipa --repo ${{ github.repository }} --dir /tmp/ipas
          ls -lh /tmp/ipas/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Maestro
        run: |
          export MAESTRO_VERSION=1.39.0
          curl -Ls "https://get.maestro.mobile.dev" | bash
          export PATH="$HOME/.maestro/bin:$PATH"
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          maestro --version

      - name: Select + boot simulator
        run: |
          SIM_ID=$(xcrun simctl list devices available -j | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS-18' in runtime or 'iOS-17' in runtime:
                  for d in devices:
                      if d['isAvailable'] and 'iPhone 16' in d['name']:
                          print(d['udid']); raise SystemExit(0)
          for runtime, devices in data['devices'].items():
              if 'iOS-18' in runtime or 'iOS-17' in runtime:
                  for d in devices:
                      if d['isAvailable'] and 'iPhone' in d['name']:
                          print(d['udid']); raise SystemExit(0)
          ")
          echo "SIM_ID=$SIM_ID" >> $GITHUB_ENV
          echo "Selected: $SIM_ID"
          open -a Simulator
          sleep 5
          xcrun simctl boot "$SIM_ID" 2>/dev/null || true
          xcrun simctl bootstatus "$SIM_ID" -b
          echo "Simulator ready"

      # ─── MITMPROXY + SYSTEM PROXY SETUP ────────────────────────────────────
      # PRIMARY FIX: iOS URLSession ignores https_proxy env vars.
      # It uses macOS system proxy settings (scutil --proxy).
      # networksetup writes to the same store — simulator picks it up automatically.

      - name: Setup mitmproxy + system proxy
        run: |
          pip3 install mitmproxy --quiet --break-system-packages 2>&1 | tail -3
          mkdir -p /tmp/artifacts/network

          # Generate mitmproxy CA cert
          mitmdump -p 8889 --set block_global=false -q &
          MPID=$!; sleep 8; kill $MPID 2>/dev/null || true
          echo "CA cert: $(ls -lh ~/.mitmproxy/mitmproxy-ca-cert.pem)"

          # Trust in simulator keychain BEFORE any app launch
          xcrun simctl keychain "${{ env.SIM_ID }}" add-root-cert ~/.mitmproxy/mitmproxy-ca-cert.pem
          echo "Cert trusted in simulator"

          # Configure macOS system proxy → simulator URLSession uses this automatically
          # Configure macOS system proxy — enumerate real service names (runner may use "Ethernet 1" etc.)
          while IFS= read -r svc; do
            [[ "$svc" =~ ^An ]] && continue  # skip "An asterisk..." header line
            svc="${svc#\*}"  # strip leading asterisk for disabled services
            networksetup -setwebproxy "$svc" 127.0.0.1 8888 off 2>/dev/null || true
            networksetup -setsecurewebproxy "$svc" 127.0.0.1 8888 off 2>/dev/null || true
            networksetup -setwebproxystate "$svc" on 2>/dev/null || true
            networksetup -setsecurewebproxystate "$svc" on 2>/dev/null || true
          done < <(networksetup -listallnetworkservices 2>/dev/null)

          # Verify
          echo "=== Proxy settings ===" && scutil --proxy | grep -E "Enabled|Port|Proxy" | head -10

      # ─── SSL KILL-SWITCH DYLIB (v2 — ObjC swizzling) ──────────────────────
      # Overrides both C-level SecTrust functions AND ObjC URLSession challenge delegates.
      # Required because Tripsy uses custom URLSession:task:didReceiveChallenge: pinning.

      - name: Build SSL kill-switch dylib
        run: |
          cat > /tmp/ssl_killswitch.m << 'CEOF'
          #import <Foundation/Foundation.h>
          #include <Security/Security.h>
          #include <objc/runtime.h>

          // ── C-level interposition (DYLD_INTERPOSE avoids conflicting-type redeclaration) ──
          // Xcode 15+ SDK declares SecTrustEvaluateWithError returning `bool` not `Boolean`
          #define DYLD_INTERPOSE(_new, _old) \
              __attribute__((used)) static struct { const void *r; const void *o; } \
              _interpose_##_old __attribute__((section("__DATA,__interpose"))) = \
              { (const void *)(unsigned long)&_new, (const void *)(unsigned long)&_old }

          static bool my_SecTrustEvaluateWithError(SecTrustRef t, CFErrorRef *e) {
              if (e) *e = NULL; return true;
          }
          static OSStatus my_SecTrustEvaluate(SecTrustRef t, SecTrustResultType *r) {
              if (r) *r = kSecTrustResultProceed; return 0;
          }
          static OSStatus my_SecTrustGetTrustResult(SecTrustRef t, SecTrustResultType *r) {
              if (r) *r = kSecTrustResultProceed; return 0;
          }
          DYLD_INTERPOSE(my_SecTrustEvaluateWithError, SecTrustEvaluateWithError)
          DYLD_INTERPOSE(my_SecTrustEvaluate, SecTrustEvaluate)
          DYLD_INTERPOSE(my_SecTrustGetTrustResult, SecTrustGetTrustResult)

          // ── ObjC-level challenge bypass ────────────────────────────────────
          // Hooks ALL classes implementing URLSession challenge delegates.
          // This bypasses custom delegate-based cert pinning (Tripsy pattern).

          static void bypass_task_challenge(
              id self, SEL _cmd,
              NSURLSession *session, NSURLSessionTask *task,
              NSURLAuthenticationChallenge *challenge,
              void (^handler)(NSURLSessionAuthChallengeDisposition, NSURLCredential *)
          ) {
              NSString *method = [[challenge protectionSpace] authenticationMethod];
              if ([method isEqualToString:NSURLAuthenticationMethodServerTrust]) {
                  SecTrustRef trust = [[challenge protectionSpace] serverTrust];
                  NSURLCredential *cred = [NSURLCredential credentialForTrust:trust];
                  handler(NSURLSessionAuthChallengeUseCredential, cred);
              } else {
                  handler(NSURLSessionAuthChallengePerformDefaultHandling, nil);
              }
          }

          static void bypass_session_challenge(
              id self, SEL _cmd,
              NSURLSession *session,
              NSURLAuthenticationChallenge *challenge,
              void (^handler)(NSURLSessionAuthChallengeDisposition, NSURLCredential *)
          ) {
              NSString *method = [[challenge protectionSpace] authenticationMethod];
              if ([method isEqualToString:NSURLAuthenticationMethodServerTrust]) {
                  SecTrustRef trust = [[challenge protectionSpace] serverTrust];
                  NSURLCredential *cred = [NSURLCredential credentialForTrust:trust];
                  handler(NSURLSessionAuthChallengeUseCredential, cred);
              } else {
                  handler(NSURLSessionAuthChallengePerformDefaultHandling, nil);
              }
          }

          __attribute__((constructor))
          static void ssl_killswitch_init() {
              // Delay to allow Swift runtime to register all classes
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(2 * NSEC_PER_SEC)),
                             dispatch_get_main_queue(), ^{
                  unsigned int count;
                  Class *classes = objc_copyClassList(&count);

                  SEL taskSel = NSSelectorFromString(@"URLSession:task:didReceiveChallenge:completionHandler:");
                  SEL sessSel = NSSelectorFromString(@"URLSession:didReceiveChallenge:completionHandler:");

                  int hooked = 0;
                  for (unsigned int i = 0; i < count; i++) {
                      Class cls = classes[i];
                      Method m;
                      if ((m = class_getInstanceMethod(cls, taskSel))) {
                          method_setImplementation(m, (IMP)bypass_task_challenge);
                          hooked++;
                      }
                      if ((m = class_getInstanceMethod(cls, sessSel))) {
                          method_setImplementation(m, (IMP)bypass_session_challenge);
                          hooked++;
                      }
                  }
                  free(classes);
                  NSLog(@"[ssl-killswitch] hooked %d challenge handlers", hooked);
              });
          }
          CEOF

          SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          clang -arch arm64 -dynamiclib \
            -target arm64-apple-ios16.0-simulator \
            -isysroot "$SDK" \
            -framework Security \
            -framework Foundation \
            -o /tmp/ssl_killswitch.dylib \
            /tmp/ssl_killswitch.m 2>&1 \
          && echo "SSL kill-switch v2 built OK" || echo "Build failed — proceeding without"

      # ─── TRIPSY ────────────────────────────────────────────────────────────

      - name: Extract + patch Tripsy IPA
        run: |
          cd /tmp/ipas
          unzip -q Tripsy.ipa -d tripsy_app
          APP_PATH=$(find /tmp/ipas/tripsy_app/Payload -name "*.app" -maxdepth 1 -type d)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          APP_NAME=$(basename "$APP_PATH" .app)

          rm -rf "$APP_PATH/PlugIns" "$APP_PATH/Extensions" "$APP_PATH/Watch" 2>/dev/null || true
          rm -rf "$APP_PATH/Frameworks/Setapp.framework" 2>/dev/null || true

          cat > /tmp/sim_ents.plist << 'ENTSEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
              <key>get-task-allow</key><true/>
              <key>com.apple.security.get-task-allow</key><true/>
          </dict></plist>
          ENTSEOF

          patch_macho() {
            local f="$1"
            if file "$f" 2>/dev/null | grep -qE "Mach-O (64-bit )?executable|Mach-O (64-bit )?dynamically linked"; then
              vtool -set-build-version iossimulator 16.0 16.0 -replace -output "${f}.sim" "$f" 2>/dev/null \
                && mv "${f}.sim" "$f" && echo "vtool ok: $(basename $f)" \
                || echo "vtool skip: $(basename $f)"
            fi
          }
          patch_macho "$APP_PATH/$APP_NAME"
          find "$APP_PATH/Frameworks" -type f 2>/dev/null | while read f; do patch_macho "$f"; done

          find "$APP_PATH/Frameworks" -maxdepth 2 -type f | while read f; do
            file "$f" 2>/dev/null | grep -qE "Mach-O" && codesign --remove-signature "$f" 2>/dev/null || true
          done
          codesign --remove-signature "$APP_PATH/$APP_NAME" 2>/dev/null || true
          codesign --remove-signature "$APP_PATH" 2>/dev/null || true
          find "$APP_PATH/Frameworks" -maxdepth 1 \( -name "*.framework" -o -name "*.dylib" \) | while read fw; do
            codesign -f -s - "$fw" 2>/dev/null && echo "signed: $(basename $fw)" || echo "sign-fail: $(basename $fw)"
          done
          codesign -f -s - --entitlements /tmp/sim_ents.plist "$APP_PATH"

          xcrun simctl install "${{ env.SIM_ID }}" "$APP_PATH"
          echo "Tripsy installed"

      - name: Extract Tripsy color assets
        run: |
          mkdir -p /tmp/artifacts/tripsy-colors
          xcrun assetutil --info "${{ env.APP_PATH }}/Assets.car" \
            > /tmp/artifacts/tripsy-colors/full_catalog.json 2>&1 || true
          python3 << 'PYEOF'
          import json
          raw = open("/tmp/artifacts/tripsy-colors/full_catalog.json").read()
          idx = raw.find('[')
          data = json.loads(raw[idx:]) if idx >= 0 else []
          colors = [x for x in data if x.get("AssetType") == "Color"]
          out = {}
          for c in colors:
              name = c.get("Name", "?")
              rgba = c.get("Color components", [])
              appearance = c.get("Appearance", "Any")
              if len(rgba) >= 3:
                  r,g,b = int(rgba[0]*255), int(rgba[1]*255), int(rgba[2]*255)
                  hex_val = f"#{r:02X}{g:02X}{b:02X}"
              else:
                  hex_val = None
              if name not in out: out[name] = {}
              out[name][appearance] = hex_val
          with open("/tmp/artifacts/tripsy-colors/colors.json","w") as f:
              json.dump(out, f, indent=2)
          print(f"Extracted {len(colors)} color entries, {len(out)} named colors")
          PYEOF

      - name: Launch Tripsy + Maestro flow
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          BUNDLE_ID="app.tripsy.ios"
          OUT="/tmp/artifacts/tripsy-screenshots"
          mkdir -p "$OUT" /tmp/maestro

          echo "Launching Tripsy..."
          xcrun simctl launch "$SIM_ID" "$BUNDLE_ID" 2>&1 || true
          sleep 18

          xcrun simctl io "$SIM_ID" screenshot "$OUT/00_launch_raw.png" 2>/dev/null || true

          TRIPSY_FLOW_B64=""
          echo "$TRIPSY_FLOW_B64" | base64 --decode > /tmp/maestro/tripsy_flow.yaml

          maestro --device "$SIM_ID" test /tmp/maestro/tripsy_flow.yaml \
            2>&1 | tee "$OUT/maestro_log.txt" || true

          MAESTRO_OUT=$(ls -td ~/.maestro/tests/*/ 2>/dev/null | head -1)
          if [ -n "$MAESTRO_OUT" ]; then
            find "$MAESTRO_OUT" -name "*.png" -exec cp {} "$OUT/" \; 2>/dev/null || true
          fi
          echo "Total screenshots: $(ls $OUT/*.png 2>/dev/null | wc -l)"

      - name: Dump Tripsy container
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          OUT="/tmp/artifacts/tripsy-container"
          mkdir -p "$OUT"
          CONTAINER=$(xcrun simctl get_app_container "$SIM_ID" "app.tripsy.ios" data 2>/dev/null || echo "")
          if [ -n "$CONTAINER" ]; then
            find "$CONTAINER/Library/Preferences" -name "*.plist" 2>/dev/null | while read f; do
              name=$(basename "$f")
              plutil -convert json "$f" -o "$OUT/${name}.json" 2>/dev/null || cp "$f" "$OUT/$name"
            done
            find "$CONTAINER" -name "*.sqlite*" 2>/dev/null -exec cp {} "$OUT/" \;
            find "$CONTAINER" -type f 2>/dev/null | sed "s|$CONTAINER/||" > "$OUT/file_tree.txt"
            echo "Container: $(wc -l < $OUT/file_tree.txt) files"
          else
            echo "No container"
          fi

      # ─── NETWORK CAPTURE — TRIPSY ──────────────────────────────────────────
      # System proxy is already active (set in "Setup mitmproxy + system proxy" step).
      # URLSession picks up macOS scutil --proxy automatically — no env vars needed.
      # Kill-switch dylib injected via DYLD_INSERT_LIBRARIES to bypass ObjC delegate pinning.

      - name: Capture Tripsy network traffic
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          BUNDLE_ID="app.tripsy.ios"

          xcrun simctl terminate "$SIM_ID" "$BUNDLE_ID" 2>/dev/null || true
          sleep 2

          mitmdump -p 8888 \
            --save-stream-file /tmp/artifacts/network/tripsy_traffic.mitm \
            --set block_global=false -q &
          MPID=$!; sleep 3

          if [ -f /tmp/ssl_killswitch.dylib ]; then
            xcrun simctl launch --terminate-running-process "$SIM_ID" "$BUNDLE_ID" \
              DYLD_INSERT_LIBRARIES=/tmp/ssl_killswitch.dylib 2>&1 || true
          else
            xcrun simctl launch "$SIM_ID" "$BUNDLE_ID" 2>&1 || true
          fi

          echo "Capturing 60s..."
          sleep 60
          kill $MPID 2>/dev/null; sleep 2
          echo "Tripsy traffic: $(wc -c < /tmp/artifacts/network/tripsy_traffic.mitm) bytes"

      # ─── WANDERLOG ─────────────────────────────────────────────────────────

      - name: Extract + patch Wanderlog IPA
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          cd /tmp/ipas
          unzip -q "Wanderlog_v2.208.ipa" -d wanderlog_app
          WL_APP=$(find /tmp/ipas/wanderlog_app/Payload -name "*.app" -maxdepth 1 -type d)
          echo "WL_APP=$WL_APP" >> $GITHUB_ENV
          APP_NAME=$(basename "$WL_APP" .app)

          xcrun simctl terminate "$SIM_ID" "app.tripsy.ios" 2>/dev/null || true
          sleep 2

          rm -rf "$WL_APP/PlugIns" "$WL_APP/Extensions" 2>/dev/null || true

          cat > /tmp/sim_ents_wl.plist << 'ENTSEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
              <key>get-task-allow</key><true/>
              <key>com.apple.security.get-task-allow</key><true/>
          </dict></plist>
          ENTSEOF

          patch_macho() {
            local f="$1"
            if file "$f" 2>/dev/null | grep -qE "Mach-O (64-bit )?executable|Mach-O (64-bit )?dynamically linked"; then
              vtool -set-build-version iossimulator 16.0 16.0 -replace -output "${f}.sim" "$f" 2>/dev/null \
                && mv "${f}.sim" "$f" && echo "vtool ok: $(basename $f)" \
                || echo "vtool skip: $(basename $f)"
            fi
          }
          patch_macho "$WL_APP/$APP_NAME"
          find "$WL_APP/Frameworks" -type f 2>/dev/null | while read f; do patch_macho "$f"; done

          find "$WL_APP/Frameworks" -maxdepth 2 -type f | while read f; do
            file "$f" 2>/dev/null | grep -qE "Mach-O" && codesign --remove-signature "$f" 2>/dev/null || true
          done
          codesign --remove-signature "$WL_APP/$APP_NAME" 2>/dev/null || true
          codesign --remove-signature "$WL_APP" 2>/dev/null || true
          find "$WL_APP/Frameworks" -maxdepth 1 \( -name "*.framework" -o -name "*.dylib" \) | while read fw; do
            codesign -f -s - "$fw" 2>/dev/null && echo "signed: $(basename $fw)" || echo "sign-fail: $(basename $fw)"
          done
          codesign -f -s - --entitlements /tmp/sim_ents_wl.plist "$WL_APP"
          xcrun simctl install "$SIM_ID" "$WL_APP"
          echo "Wanderlog installed"

      - name: Launch Wanderlog + Maestro flow
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          BUNDLE_ID="com.wanderlog.ios"
          OUT="/tmp/artifacts/wanderlog-screenshots"
          mkdir -p "$OUT"

          echo "Launching Wanderlog..."
          xcrun simctl launch "$SIM_ID" "$BUNDLE_ID" 2>&1 || true
          sleep 22

          xcrun simctl io "$SIM_ID" screenshot "$OUT/00_launch_raw.png" 2>/dev/null || true

          WANDERLOG_FLOW_B64=""
          echo "$WANDERLOG_FLOW_B64" | base64 --decode > /tmp/maestro/wanderlog_flow.yaml

          maestro --device "$SIM_ID" test /tmp/maestro/wanderlog_flow.yaml \
            2>&1 | tee "$OUT/maestro_log.txt" || true

          MAESTRO_OUT=$(ls -td ~/.maestro/tests/*/ 2>/dev/null | head -1)
          if [ -n "$MAESTRO_OUT" ]; then
            find "$MAESTRO_OUT" -name "*.png" -exec cp {} "$OUT/" \; 2>/dev/null || true
          fi
          echo "Total screenshots: $(ls $OUT/*.png 2>/dev/null | wc -l)"

      - name: Dump Wanderlog container
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          OUT="/tmp/artifacts/wanderlog-container"
          mkdir -p "$OUT"
          CONTAINER=$(xcrun simctl get_app_container "$SIM_ID" "com.wanderlog.ios" data 2>/dev/null || echo "")
          if [ -n "$CONTAINER" ]; then
            find "$CONTAINER/Library/Preferences" -name "*.plist" 2>/dev/null | while read f; do
              name=$(basename "$f")
              plutil -convert json "$f" -o "$OUT/${name}.json" 2>/dev/null || cp "$f" "$OUT/$name"
            done
            find "$CONTAINER" -name "*.sqlite*" 2>/dev/null -exec cp {} "$OUT/" \;
            find "$CONTAINER" -type f 2>/dev/null | sed "s|$CONTAINER/||" > "$OUT/file_tree.txt"
            echo "Wanderlog container: $(wc -l < $OUT/file_tree.txt) files"
          else
            echo "No container"
          fi

      # ─── NETWORK CAPTURE — WANDERLOG ───────────────────────────────────────

      - name: Capture Wanderlog network traffic
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          BUNDLE_ID="com.wanderlog.ios"

          xcrun simctl terminate "$SIM_ID" "app.tripsy.ios" 2>/dev/null || true
          xcrun simctl terminate "$SIM_ID" "$BUNDLE_ID" 2>/dev/null || true
          sleep 2

          mitmdump -p 8888 \
            --save-stream-file /tmp/artifacts/network/wanderlog_traffic.mitm \
            --set block_global=false -q &
          MPID=$!; sleep 3

          if [ -f /tmp/ssl_killswitch.dylib ]; then
            xcrun simctl launch --terminate-running-process "$SIM_ID" "$BUNDLE_ID" \
              DYLD_INSERT_LIBRARIES=/tmp/ssl_killswitch.dylib 2>&1 || true
          else
            xcrun simctl launch "$SIM_ID" "$BUNDLE_ID" 2>&1 || true
          fi

          echo "Capturing 60s..."
          sleep 60
          kill $MPID 2>/dev/null; sleep 2
          echo "Wanderlog traffic: $(wc -c < /tmp/artifacts/network/wanderlog_traffic.mitm) bytes"

      # ─── PARSE FLOWS ────────────────────────────────────────────────────────

      - name: Parse network flows to JSON
        if: always()
        run: |
          python3 << 'PYEOF'
          import json, os
          def parse_flows(mitm_path, out_path):
              size = os.path.getsize(mitm_path) if os.path.exists(mitm_path) else 0
              print(f"{os.path.basename(mitm_path)}: {size} bytes")
              if size == 0:
                  with open(out_path, "w") as f: json.dump([], f)
                  return
              try:
                  from mitmproxy import io as mio, http
                  flows = []
                  with open(mitm_path, "rb") as f:
                      for flow in mio.FlowReader(f).stream():
                          if isinstance(flow, http.HTTPFlow):
                              req, resp = flow.request, flow.response
                              flows.append({
                                  "method": req.method, "url": req.pretty_url,
                                  "req_headers": dict(req.headers),
                                  "req_body": req.text[:3000] if req.content else None,
                                  "status": resp.status_code if resp else None,
                                  "resp_headers": dict(resp.headers) if resp else {},
                                  "resp_body": resp.text[:5000] if resp and resp.content else None,
                              })
                  with open(out_path, "w") as f: json.dump(flows, f, indent=2)
                  print(f"  -> {len(flows)} flows")
              except Exception as e:
                  print(f"  -> parse error: {e}")
                  with open(out_path, "w") as f: json.dump([], f)

          for fname in ["tripsy_traffic", "wanderlog_traffic"]:
              parse_flows(f"/tmp/artifacts/network/{fname}.mitm",
                          f"/tmp/artifacts/network/{fname}.json")
          PYEOF

      # ─── CLEANUP + UPLOAD ──────────────────────────────────────────────────

      - name: Cleanup system proxy
        if: always()
        run: |
          while IFS= read -r svc; do
            [[ "$svc" =~ ^An ]] && continue
            svc="${svc#\*}"
            networksetup -setwebproxystate "$svc" off 2>/dev/null || true
            networksetup -setsecurewebproxystate "$svc" off 2>/dev/null || true
          done < <(networksetup -listallnetworkservices 2>/dev/null)
          echo "System proxy disabled"

      - name: List artifacts
        if: always()
        run: |
          echo "=== All artifacts ==="
          find /tmp/artifacts -type f | sort
          echo ""
          echo "Tripsy screenshots: $(ls /tmp/artifacts/tripsy-screenshots/*.png 2>/dev/null | wc -l)"
          echo "Wanderlog screenshots: $(ls /tmp/artifacts/wanderlog-screenshots/*.png 2>/dev/null | wc -l)"
          echo "Network: tripsy=$(wc -c < /tmp/artifacts/network/tripsy_traffic.mitm 2>/dev/null || echo 0)B wanderlog=$(wc -c < /tmp/artifacts/network/wanderlog_traffic.mitm 2>/dev/null || echo 0)B"

      - name: Upload tripsy-dynamic
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tripsy-dynamic
          path: /tmp/artifacts/tripsy-*
          retention-days: 30

      - name: Upload wanderlog-dynamic
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wanderlog-dynamic
          path: /tmp/artifacts/wanderlog-*
          retention-days: 30

      - name: Upload network artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: network-capture
          path: /tmp/artifacts/network/
          retention-days: 30
