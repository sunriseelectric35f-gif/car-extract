name: Dynamic Analysis (iOS Simulator)
on:
  workflow_dispatch:

jobs:
  dynamic:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Download IPAs from release
        run: |
          gh release download v1.0-ipa --repo ${{ github.repository }} --dir /tmp/ipas
          ls -lh /tmp/ipas/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Select simulator
        run: |
          xcrun simctl list devices available | grep iPhone | head -20
          SIM_ID=$(xcrun simctl list devices available -j | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS-18' in runtime or 'iOS-17' in runtime:
                  for d in devices:
                      if d['isAvailable'] and 'iPhone' in d['name']:
                          print(d['udid'])
                          raise SystemExit(0)
          ")
          echo "SIM_ID=$SIM_ID" >> $GITHUB_ENV
          echo "Selected sim: $SIM_ID"

      - name: Boot simulator
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          open -a Simulator
          sleep 5
          xcrun simctl boot "$SIM_ID" 2>/dev/null || true
          xcrun simctl bootstatus "$SIM_ID" -b
          echo "Simulator ready"

      # ─── TRIPSY ────────────────────────────────────────────────────────────

      - name: Extract Tripsy IPA
        run: |
          cd /tmp/ipas
          unzip -q Tripsy.ipa -d tripsy_app
          APP_PATH=$(find /tmp/ipas/tripsy_app/Payload -name "*.app" -maxdepth 1 -type d)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Tripsy app: $APP_PATH"
          ls "$APP_PATH" | head -20

      - name: Extract Tripsy color assets
        run: |
          mkdir -p /tmp/artifacts/tripsy-colors
          xcrun assetutil --info "${{ env.APP_PATH }}/Assets.car" \
            > /tmp/artifacts/tripsy-colors/full_catalog.json 2>&1 || true
          python3 << 'PYEOF'
          import json
          raw = open("/tmp/artifacts/tripsy-colors/full_catalog.json").read()
          idx = raw.find('[')
          data = json.loads(raw[idx:]) if idx >= 0 else []
          colors = [x for x in data if x.get("AssetType") == "Color"]
          def to_hex(comps):
              if isinstance(comps, list) and len(comps) >= 3:
                  return "#{:02X}{:02X}{:02X}".format(int(comps[0]*255),int(comps[1]*255),int(comps[2]*255))
              return None
          report = {}
          for c in colors:
              name = c.get("Name", "unknown")
              comps = c.get("Color components", [])
              appearance = c.get("Appearance", "Any")
              if name not in report:
                  report[name] = {}
              report[name][appearance] = {"hex": to_hex(comps), "components": comps}
          with open("/tmp/artifacts/tripsy-colors/colors.json", "w") as f:
              json.dump(report, f, indent=2)
          with open("/tmp/artifacts/tripsy-colors/colors.md", "w") as f:
              f.write(f"# Tripsy Color Palette ({len(report)} named colors)\n\n")
              for name in sorted(report.keys()):
                  parts = [f"{app}: {v['hex']}" for app, v in sorted(report[name].items())]
                  f.write(f"- **{name}**: {' | '.join(parts)}\n")
          print(f"Tripsy colors: {len(report)} named, {len(colors)} entries total")
          PYEOF

      - name: Patch Tripsy binary for simulator (vtool + resign)
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          APP_PATH="${{ env.APP_PATH }}"
          APP_NAME=$(basename "$APP_PATH" .app)

          # Remove device-only extensions that can't run in sim
          rm -rf "$APP_PATH/PlugIns" "$APP_PATH/Extensions" "$APP_PATH/Watch" 2>/dev/null || true

          # Remove Setapp framework (checks entitlements at launch, rejects simulator)
          rm -rf "$APP_PATH/Frameworks/Setapp.framework" 2>/dev/null || true

          # Minimal simulator entitlements — strip all team/app IDs, just allow task
          cat > /tmp/sim_ents.plist << 'ENTSEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>get-task-allow</key>
              <true/>
              <key>com.apple.security.get-task-allow</key>
              <true/>
          </dict>
          </plist>
          ENTSEOF

          # vtool: patch every Mach-O binary from ios -> iossimulator platform
          patch_macho() {
            local f="$1"
            if file "$f" 2>/dev/null | grep -qE "Mach-O (64-bit )?executable|Mach-O (64-bit )?dynamically linked"; then
              vtool -set-build-version iossimulator 16.0 16.0 -replace -output "${f}.sim" "$f" 2>/dev/null \
                && mv "${f}.sim" "$f" && echo "vtool ok: $(basename $f)" \
                || echo "vtool skip: $(basename $f)"
            fi
          }

          patch_macho "$APP_PATH/$APP_NAME"
          find "$APP_PATH/Frameworks" -type f 2>/dev/null | while read f; do patch_macho "$f"; done

          # Strip all existing signatures
          find "$APP_PATH/Frameworks" -maxdepth 2 -type f -exec codesign --remove-signature {} \; 2>/dev/null || true
          codesign --remove-signature "$APP_PATH/$APP_NAME" 2>/dev/null || true
          codesign --remove-signature "$APP_PATH" 2>/dev/null || true

          # Re-sign: frameworks first (no entitlements needed), then main bundle with minimal ents
          find "$APP_PATH/Frameworks" -maxdepth 1 \( -name "*.framework" -o -name "*.dylib" \) | while read fw; do
            codesign -f -s - "$fw" 2>/dev/null && echo "signed: $(basename $fw)" || echo "sign-fail: $(basename $fw)"
          done
          codesign -f -s - --entitlements /tmp/sim_ents.plist "$APP_PATH"
          echo "Signing: $(codesign -dv --entitlements - "$APP_PATH" 2>&1 | head -5)"

          # Install into simulator
          xcrun simctl install "$SIM_ID" "$APP_PATH"
          echo "Tripsy installed into $SIM_ID"

      - name: Launch Tripsy + capture screenshots
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          BUNDLE_ID="app.tripsy.ios"
          OUT="/tmp/artifacts/tripsy-screenshots"
          mkdir -p "$OUT"

          echo "Launching Tripsy..."
          xcrun simctl launch "$SIM_ID" "$BUNDLE_ID" 2>&1 || \
            xcrun simctl launch "$SIM_ID" "$BUNDLE_ID" 2>&1 || \
            echo "Tripsy launch failed — screenshots will be sim idle state"

          SS() { xcrun simctl io "$SIM_ID" screenshot "$OUT/$1.png" 2>/dev/null && echo "screenshot: $1" || true; }
          TAP() { xcrun simctl io "$SIM_ID" tap "$1" "$2" 2>/dev/null || true; }

          sleep 4;  SS "01_launch"
          sleep 3;  SS "02_t3"
          sleep 3;  SS "03_t6"
          sleep 4;  SS "04_t10"

          # Tap center-bottom (Continue / Get Started / Sign In)
          TAP 195 750; sleep 3; SS "05_tap1"
          TAP 195 700; sleep 3; SS "06_tap2"
          TAP 195 650; sleep 3; SS "07_tap3"

          # Tap top-right (skip/close)
          TAP 370 60;  sleep 3; SS "08_skip"

          # Swipe up (scroll onboarding)
          xcrun simctl io "$SIM_ID" swipe 195 600 195 200 2>/dev/null || true
          sleep 2; SS "09_scroll1"

          sleep 3; SS "10_final"

          echo "Tripsy screenshots: $(ls $OUT/*.png 2>/dev/null | wc -l)"

      - name: Dump Tripsy app container
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          BUNDLE_ID="app.tripsy.ios"
          OUT="/tmp/artifacts/tripsy-container"
          mkdir -p "$OUT"

          CONTAINER=$(xcrun simctl get_app_container "$SIM_ID" "$BUNDLE_ID" data 2>/dev/null || echo "")
          echo "Container: $CONTAINER"

          if [ -n "$CONTAINER" ]; then
            # UserDefaults → JSON
            find "$CONTAINER/Library/Preferences" -name "*.plist" 2>/dev/null | while read f; do
              name=$(basename "$f")
              plutil -convert json "$f" -o "$OUT/${name}.json" 2>/dev/null || cp "$f" "$OUT/$name"
            done
            # CoreData sqlite files
            find "$CONTAINER" -name "*.sqlite*" 2>/dev/null -exec cp {} "$OUT/" \;
            # File tree
            find "$CONTAINER" -type f 2>/dev/null | sed "s|$CONTAINER/||" > "$OUT/file_tree.txt"
            echo "Container: $(wc -l < $OUT/file_tree.txt) files"
          else
            echo "No container (app may not have launched successfully)"
          fi

      # ─── WANDERLOG ─────────────────────────────────────────────────────────

      - name: Extract Wanderlog IPA
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          cd /tmp/ipas
          unzip -q "Wanderlog_v2.208.ipa" -d wanderlog_app
          WL_APP=$(find /tmp/ipas/wanderlog_app/Payload -name "*.app" -maxdepth 1 -type d)
          echo "WL_APP=$WL_APP" >> $GITHUB_ENV
          echo "Wanderlog app: $WL_APP"
          ls "$WL_APP" | head -20

      - name: Extract Wanderlog color assets
        run: |
          WL_APP="${{ env.WL_APP }}"
          mkdir -p /tmp/artifacts/wanderlog-colors
          if [ -f "$WL_APP/Assets.car" ]; then
            xcrun assetutil --info "$WL_APP/Assets.car" \
              > /tmp/artifacts/wanderlog-colors/full_catalog.json 2>&1 || true
          else
            echo "No Assets.car in Wanderlog (RN app — colors live in JS bundle)" \
              > /tmp/artifacts/wanderlog-colors/note.txt
            echo "[]" > /tmp/artifacts/wanderlog-colors/full_catalog.json
          fi
          python3 << 'PYEOF'
          import json
          raw = open("/tmp/artifacts/wanderlog-colors/full_catalog.json").read()
          idx = raw.find('[')
          data = json.loads(raw[idx:]) if idx >= 0 else []
          colors = [x for x in data if x.get("AssetType") == "Color"]
          print(f"Wanderlog .car colors: {len(colors)} (RN uses JS bundle for colors)")
          PYEOF

      - name: Patch Wanderlog binary for simulator (vtool + resign)
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          WL_APP="${{ env.WL_APP }}"
          APP_NAME=$(basename "$WL_APP" .app)

          xcrun simctl terminate "$SIM_ID" "app.tripsy.ios" 2>/dev/null || true
          sleep 2

          rm -rf "$WL_APP/PlugIns" "$WL_APP/Extensions" 2>/dev/null || true

          cat > /tmp/sim_ents_wl.plist << 'ENTSEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>get-task-allow</key>
              <true/>
              <key>com.apple.security.get-task-allow</key>
              <true/>
          </dict>
          </plist>
          ENTSEOF

          patch_macho() {
            local f="$1"
            if file "$f" 2>/dev/null | grep -qE "Mach-O (64-bit )?executable|Mach-O (64-bit )?dynamically linked"; then
              vtool -set-build-version iossimulator 16.0 16.0 -replace -output "${f}.sim" "$f" 2>/dev/null \
                && mv "${f}.sim" "$f" && echo "vtool ok: $(basename $f)" \
                || echo "vtool skip: $(basename $f)"
            fi
          }

          patch_macho "$WL_APP/$APP_NAME"
          find "$WL_APP/Frameworks" -type f 2>/dev/null | while read f; do patch_macho "$f"; done

          find "$WL_APP/Frameworks" -maxdepth 2 -type f -exec codesign --remove-signature {} \; 2>/dev/null || true
          codesign --remove-signature "$WL_APP/$APP_NAME" 2>/dev/null || true
          codesign --remove-signature "$WL_APP" 2>/dev/null || true

          find "$WL_APP/Frameworks" -maxdepth 1 \( -name "*.framework" -o -name "*.dylib" \) | while read fw; do
            codesign -f -s - "$fw" 2>/dev/null && echo "signed: $(basename $fw)" || echo "sign-fail: $(basename $fw)"
          done
          codesign -f -s - --entitlements /tmp/sim_ents_wl.plist "$WL_APP"

          xcrun simctl install "$SIM_ID" "$WL_APP"
          echo "Wanderlog installed"

      - name: Launch Wanderlog + capture screenshots
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          BUNDLE_ID="com.wanderlog.ios"
          OUT="/tmp/artifacts/wanderlog-screenshots"
          mkdir -p "$OUT"

          echo "Launching Wanderlog..."
          xcrun simctl launch "$SIM_ID" "$BUNDLE_ID" 2>&1 || \
            xcrun simctl launch "$SIM_ID" "$BUNDLE_ID" 2>&1 || \
            echo "Wanderlog launch failed — screenshots will be sim idle state"

          SS() { xcrun simctl io "$SIM_ID" screenshot "$OUT/$1.png" 2>/dev/null && echo "screenshot: $1" || true; }
          TAP() { xcrun simctl io "$SIM_ID" tap "$1" "$2" 2>/dev/null || true; }

          sleep 5;  SS "01_launch"
          sleep 4;  SS "02_t5"
          sleep 4;  SS "03_t9"
          sleep 3;  SS "04_t12"

          # Tap Continue / Get Started
          TAP 195 750; sleep 4; SS "05_tap1"
          TAP 195 700; sleep 4; SS "06_tap2"
          TAP 195 650; sleep 3; SS "07_tap3"

          # Close/skip buttons
          TAP 370 60;  sleep 3; SS "08_skip"
          TAP 30  60;  sleep 3; SS "09_back"

          xcrun simctl io "$SIM_ID" swipe 195 600 195 200 2>/dev/null || true
          sleep 2; SS "10_scroll1"

          sleep 3; SS "11_final"

          echo "Wanderlog screenshots: $(ls $OUT/*.png 2>/dev/null | wc -l)"

      - name: Dump Wanderlog app container
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          BUNDLE_ID="com.wanderlog.ios"
          OUT="/tmp/artifacts/wanderlog-container"
          mkdir -p "$OUT"

          CONTAINER=$(xcrun simctl get_app_container "$SIM_ID" "$BUNDLE_ID" data 2>/dev/null || echo "")
          echo "Container: $CONTAINER"

          if [ -n "$CONTAINER" ]; then
            find "$CONTAINER/Library/Preferences" -name "*.plist" 2>/dev/null | while read f; do
              name=$(basename "$f")
              plutil -convert json "$f" -o "$OUT/${name}.json" 2>/dev/null || cp "$f" "$OUT/$name"
            done
            find "$CONTAINER" -name "*.sqlite*" 2>/dev/null -exec cp {} "$OUT/" \;
            find "$CONTAINER" -type f 2>/dev/null | sed "s|$CONTAINER/||" > "$OUT/file_tree.txt"
            echo "Wanderlog container: $(wc -l < $OUT/file_tree.txt) files"
          else
            echo "No container found"
          fi

      # ─── NETWORK CAPTURE ───────────────────────────────────────────────────

      - name: Setup mitmproxy cert + simulator proxy
        run: |
          pip3 install mitmproxy --quiet --break-system-packages 2>&1 | tail -3
          mkdir -p /tmp/artifacts/network

          # Generate CA cert by running mitmdump briefly
          mitmdump -p 8889 --set block_global=false &
          MPID=$!; sleep 8; kill $MPID 2>/dev/null || true
          ls -lh ~/.mitmproxy/

          # Trust CA in simulator BEFORE any app launch
          SIM_ID="${{ env.SIM_ID }}"
          xcrun simctl keychain "$SIM_ID" add-root-cert ~/.mitmproxy/mitmproxy-ca-cert.pem
          echo "mitmproxy CA trusted"

          # Set proxy via simctl environment (affects all launched processes)
          # Store in GITHUB_ENV so subsequent steps inherit
          echo "MITM_PORT=8888" >> $GITHUB_ENV

      - name: Build SSL kill-switch dylib
        run: |
          # Minimal dylib that no-ops TLS cert validation in simulator
          cat > /tmp/ssl_killswitch.m << 'CEOF'
          #include <Security/Security.h>
          Boolean SecTrustEvaluateWithError(SecTrustRef t, CFErrorRef *e) {
              if (e) *e = NULL; return true;
          }
          OSStatus SecTrustEvaluate(SecTrustRef t, SecTrustResultType *r) {
              if (r) *r = kSecTrustResultProceed; return 0;
          }
          CEOF

          SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          clang -arch arm64 -dynamiclib \
            -target arm64-apple-ios16.0-simulator \
            -isysroot "$SDK" \
            -framework Security \
            -o /tmp/ssl_killswitch.dylib \
            /tmp/ssl_killswitch.m 2>&1 \
          && echo "SSL kill-switch built OK" \
          || echo "Build failed — will run without SSL bypass"
          ls -lh /tmp/ssl_killswitch.dylib 2>/dev/null || true

      - name: Capture Tripsy network traffic
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          xcrun simctl terminate "$SIM_ID" "app.tripsy.ios" 2>/dev/null || true
          sleep 2

          # Start mitmproxy
          mitmdump -p 8888 \
            --save-stream-file /tmp/artifacts/network/tripsy_traffic.mitm \
            --set block_global=false -q &
          MPID=$!; sleep 3

          # Launch with proxy env vars + SSL bypass dylib
          if [ -f /tmp/ssl_killswitch.dylib ]; then
            xcrun simctl launch --terminate-running-process \
              "$SIM_ID" "app.tripsy.ios" \
              DYLD_INSERT_LIBRARIES=/tmp/ssl_killswitch.dylib \
              https_proxy=http://127.0.0.1:8888 \
              http_proxy=http://127.0.0.1:8888 2>&1 || \
            xcrun simctl launch --terminate-running-process \
              "$SIM_ID" "app.tripsy.ios" \
              https_proxy=http://127.0.0.1:8888 \
              http_proxy=http://127.0.0.1:8888 2>&1 || true
          else
            xcrun simctl launch --terminate-running-process \
              "$SIM_ID" "app.tripsy.ios" \
              https_proxy=http://127.0.0.1:8888 \
              http_proxy=http://127.0.0.1:8888 2>&1 || true
          fi

          echo "Capturing Tripsy traffic for 45s..."
          sleep 45
          kill $MPID 2>/dev/null; sleep 2
          echo "Tripsy .mitm: $(wc -c < /tmp/artifacts/network/tripsy_traffic.mitm 2>/dev/null || echo 0) bytes"

      - name: Capture Wanderlog network traffic
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          xcrun simctl terminate "$SIM_ID" "app.tripsy.ios" 2>/dev/null || true
          xcrun simctl terminate "$SIM_ID" "com.wanderlog.ios" 2>/dev/null || true
          sleep 2

          mitmdump -p 8888 \
            --save-stream-file /tmp/artifacts/network/wanderlog_traffic.mitm \
            --set block_global=false -q &
          MPID=$!; sleep 3

          if [ -f /tmp/ssl_killswitch.dylib ]; then
            xcrun simctl launch --terminate-running-process \
              "$SIM_ID" "com.wanderlog.ios" \
              DYLD_INSERT_LIBRARIES=/tmp/ssl_killswitch.dylib \
              https_proxy=http://127.0.0.1:8888 \
              http_proxy=http://127.0.0.1:8888 2>&1 || \
            xcrun simctl launch --terminate-running-process \
              "$SIM_ID" "com.wanderlog.ios" \
              https_proxy=http://127.0.0.1:8888 \
              http_proxy=http://127.0.0.1:8888 2>&1 || true
          else
            xcrun simctl launch --terminate-running-process \
              "$SIM_ID" "com.wanderlog.ios" \
              https_proxy=http://127.0.0.1:8888 \
              http_proxy=http://127.0.0.1:8888 2>&1 || true
          fi

          echo "Capturing Wanderlog traffic for 45s..."
          sleep 45
          kill $MPID 2>/dev/null; sleep 2
          echo "Wanderlog .mitm: $(wc -c < /tmp/artifacts/network/wanderlog_traffic.mitm 2>/dev/null || echo 0) bytes"

      - name: Parse network flows to JSON
        if: always()
        run: |
          python3 << 'PYEOF'
          import json, os

          def parse_flows(mitm_path, out_path):
              size = os.path.getsize(mitm_path) if os.path.exists(mitm_path) else 0
              print(f"{os.path.basename(mitm_path)}: {size} bytes")
              if size == 0:
                  with open(out_path, "w") as f: json.dump([], f)
                  return
              try:
                  from mitmproxy import io as mio, http
                  flows = []
                  with open(mitm_path, "rb") as f:
                      for flow in mio.FlowReader(f).stream():
                          if isinstance(flow, http.HTTPFlow):
                              req, resp = flow.request, flow.response
                              flows.append({
                                  "method": req.method,
                                  "url": req.pretty_url,
                                  "req_headers": dict(req.headers),
                                  "req_body": req.text[:3000] if req.content else None,
                                  "status": resp.status_code if resp else None,
                                  "resp_headers": dict(resp.headers) if resp else {},
                                  "resp_body": resp.text[:5000] if resp and resp.content else None,
                              })
                  with open(out_path, "w") as f:
                      json.dump(flows, f, indent=2)
                  print(f"  -> {len(flows)} flows")
              except Exception as e:
                  print(f"  -> parse error: {e}")
                  with open(out_path, "w") as f: json.dump([], f)

          for fname in ["tripsy_traffic", "wanderlog_traffic"]:
              parse_flows(
                  f"/tmp/artifacts/network/{fname}.mitm",
                  f"/tmp/artifacts/network/{fname}.json",
              )
          PYEOF

      # ─── UPLOAD ────────────────────────────────────────────────────────────

      - name: List all artifacts
        if: always()
        run: |
          echo "=== Artifacts collected ==="
          find /tmp/artifacts -type f | sort
          echo ""
          echo "=== Screenshot count ==="
          ls /tmp/artifacts/tripsy-screenshots/*.png 2>/dev/null | wc -l || echo "0"
          ls /tmp/artifacts/wanderlog-screenshots/*.png 2>/dev/null | wc -l || echo "0"

      - name: Upload tripsy-dynamic artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tripsy-dynamic
          path: |
            /tmp/artifacts/tripsy-*
          retention-days: 30

      - name: Upload wanderlog-dynamic artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wanderlog-dynamic
          path: |
            /tmp/artifacts/wanderlog-*
          retention-days: 30

      - name: Upload network artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: network-capture
          path: /tmp/artifacts/network/
          retention-days: 30
