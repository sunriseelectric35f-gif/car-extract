name: Dynamic Analysis (iOS Simulator)
on:
  workflow_dispatch:

jobs:
  dynamic:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Download IPAs from release
        run: |
          gh release download v1.0-ipa --repo ${{ github.repository }} --dir /tmp/ipas
          ls -lh /tmp/ipas/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Maestro
        run: |
          export MAESTRO_VERSION=1.39.0
          curl -Ls "https://get.maestro.mobile.dev" | bash
          export PATH="$HOME/.maestro/bin:$PATH"
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          maestro --version

      - name: Select + boot simulator
        run: |
          xcrun simctl list devices available | grep iPhone | head -10
          SIM_ID=$(xcrun simctl list devices available -j | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS-18' in runtime or 'iOS-17' in runtime:
                  for d in devices:
                      if d['isAvailable'] and 'iPhone 16' in d['name']:
                          print(d['udid']); raise SystemExit(0)
          # fallback: any iPhone
          for runtime, devices in data['devices'].items():
              if 'iOS-18' in runtime or 'iOS-17' in runtime:
                  for d in devices:
                      if d['isAvailable'] and 'iPhone' in d['name']:
                          print(d['udid']); raise SystemExit(0)
          ")
          echo "SIM_ID=$SIM_ID" >> $GITHUB_ENV
          echo "Selected: $SIM_ID"
          open -a Simulator
          sleep 5
          xcrun simctl boot "$SIM_ID" 2>/dev/null || true
          xcrun simctl bootstatus "$SIM_ID" -b
          echo "Simulator ready"

      # ─── TRIPSY ────────────────────────────────────────────────────────────

      - name: Extract + patch Tripsy IPA
        run: |
          cd /tmp/ipas
          unzip -q Tripsy.ipa -d tripsy_app
          APP_PATH=$(find /tmp/ipas/tripsy_app/Payload -name "*.app" -maxdepth 1 -type d)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          APP_NAME=$(basename "$APP_PATH" .app)

          rm -rf "$APP_PATH/PlugIns" "$APP_PATH/Extensions" "$APP_PATH/Watch" 2>/dev/null || true
          rm -rf "$APP_PATH/Frameworks/Setapp.framework" 2>/dev/null || true

          cat > /tmp/sim_ents.plist << 'ENTSEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
              <key>get-task-allow</key><true/>
              <key>com.apple.security.get-task-allow</key><true/>
          </dict></plist>
          ENTSEOF

          patch_macho() {
            local f="$1"
            if file "$f" 2>/dev/null | grep -qE "Mach-O (64-bit )?executable|Mach-O (64-bit )?dynamically linked"; then
              vtool -set-build-version iossimulator 16.0 16.0 -replace -output "${f}.sim" "$f" 2>/dev/null \
                && mv "${f}.sim" "$f" && echo "vtool ok: $(basename $f)" \
                || echo "vtool skip: $(basename $f)"
            fi
          }
          patch_macho "$APP_PATH/$APP_NAME"
          find "$APP_PATH/Frameworks" -type f 2>/dev/null | while read f; do patch_macho "$f"; done

          find "$APP_PATH/Frameworks" -maxdepth 2 -type f -exec codesign --remove-signature {} \; 2>/dev/null || true
          codesign --remove-signature "$APP_PATH/$APP_NAME" 2>/dev/null || true
          codesign --remove-signature "$APP_PATH" 2>/dev/null || true
          find "$APP_PATH/Frameworks" -maxdepth 1 \( -name "*.framework" -o -name "*.dylib" \) | while read fw; do
            codesign -f -s - "$fw" 2>/dev/null && echo "signed: $(basename $fw)" || echo "sign-fail: $(basename $fw)"
          done
          codesign -f -s - --entitlements /tmp/sim_ents.plist "$APP_PATH"

          xcrun simctl install "${{ env.SIM_ID }}" "$APP_PATH"
          echo "Tripsy installed"

      - name: Extract Tripsy color assets
        run: |
          mkdir -p /tmp/artifacts/tripsy-colors
          xcrun assetutil --info "${{ env.APP_PATH }}/Assets.car" \
            > /tmp/artifacts/tripsy-colors/full_catalog.json 2>&1 || true
          python3 << 'PYEOF'
          import json
          raw = open("/tmp/artifacts/tripsy-colors/full_catalog.json").read()
          idx = raw.find('[')
          data = json.loads(raw[idx:]) if idx >= 0 else []
          colors = [x for x in data if x.get("AssetType") == "Color"]
          out = []
          for c in colors:
            comps = c.get("Color components", {})
            def tohex(comps):
              try:
                r = round(float(comps.get("red",0))*255)
                g = round(float(comps.get("green",0))*255)
                b = round(float(comps.get("blue",0))*255)
                return f"#{r:02X}{g:02X}{b:02X}"
              except: return None
            name = c.get("Name","?")
            hex_val = tohex(comps) if comps else None
            out.append({"name": name, "hex": hex_val, "appearances": c.get("Appearances",[])})
          with open("/tmp/artifacts/tripsy-colors/colors.json","w") as f:
            json.dump(out, f, indent=2)
          print(f"Extracted {len(out)} Tripsy colors")
          PYEOF

      - name: Launch Tripsy + run Maestro flow
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          BUNDLE_ID="app.tripsy.ios"
          OUT="/tmp/artifacts/tripsy-screenshots"
          mkdir -p "$OUT" /tmp/maestro

          # Launch via simctl (reliable — doesn't need XCTest signing)
          echo "Launching Tripsy..."
          xcrun simctl launch "$SIM_ID" "$BUNDLE_ID" 2>&1 || true
          # Wait for app to fully render (Swift app, first cold boot)
          sleep 18

          # Check if app process is alive
          xcrun simctl spawn "$SIM_ID" launchctl list 2>/dev/null | grep tripsy || echo "tripsy not in launchctl"

          # Capture launch screenshot via simctl (before Maestro touches anything)
          xcrun simctl io "$SIM_ID" screenshot "$OUT/00_launch_raw.png" 2>/dev/null || true

          # Write Maestro flow via Python — avoids YAML heredoc conflicts
          python3 << 'PYEOF'
flow = """appId: app.tripsy.ios
---
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: tripsy_01_initial

- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "OK"
    commands:
      - tapOn: "OK"
      - waitForAnimationToEnd

- takeScreenshot: tripsy_02_permissions_done

- runFlow:
    when:
      visible: "Get Started"
    commands:
      - tapOn: "Get Started"
      - waitForAnimationToEnd:
          timeout: 5000
      - takeScreenshot: tripsy_03_after_getstarted

- repeat:
    times: 8
    commands:
      - runFlow:
          when:
            visible: "Next"
          commands:
            - tapOn: "Next"
            - waitForAnimationToEnd:
                timeout: 3000
            - takeScreenshot: tripsy_slide_next
      - runFlow:
          when:
            visible: "Continue"
          commands:
            - tapOn: "Continue"
            - waitForAnimationToEnd:
                timeout: 3000
            - takeScreenshot: tripsy_slide_continue

- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
      - waitForAnimationToEnd:
          timeout: 3000
      - takeScreenshot: tripsy_skip

- runFlow:
    when:
      visible: "Maybe Later"
    commands:
      - tapOn: "Maybe Later"
      - waitForAnimationToEnd

- takeScreenshot: tripsy_04_post_onboarding

- runFlow:
    when:
      visible: "Trips"
    commands:
      - tapOn: "Trips"
      - waitForAnimationToEnd:
          timeout: 3000
      - takeScreenshot: tripsy_05_trips_tab

- runFlow:
    when:
      visible: "Explore"
    commands:
      - tapOn: "Explore"
      - waitForAnimationToEnd:
          timeout: 3000
      - takeScreenshot: tripsy_06_explore_tab

- runFlow:
    when:
      visible: "Today"
    commands:
      - tapOn: "Today"
      - waitForAnimationToEnd:
          timeout: 3000
      - takeScreenshot: tripsy_07_today_tab

- runFlow:
    when:
      visible: "Settings"
    commands:
      - tapOn: "Settings"
      - waitForAnimationToEnd:
          timeout: 3000
      - takeScreenshot: tripsy_08_settings

- takeScreenshot: tripsy_09_final
"""
with open("/tmp/maestro/tripsy_flow.yaml", "w") as f:
    f.write(flow)
print("Tripsy flow written")
PYEOF

          # Run Maestro against the already-running app
          maestro --device "$SIM_ID" test /tmp/maestro/tripsy_flow.yaml \
            2>&1 | tee "$OUT/maestro_log.txt" || true

          # Maestro saves screenshots to ~/.maestro/tests/<timestamp>/
          MAESTRO_OUT=$(ls -td ~/.maestro/tests/*/ 2>/dev/null | head -1)
          if [ -n "$MAESTRO_OUT" ]; then
            echo "Maestro output dir: $MAESTRO_OUT"
            ls "$MAESTRO_OUT" || true
            find "$MAESTRO_OUT" -name "*.png" -exec cp {} "$OUT/" \; 2>/dev/null || true
          fi

          echo "Total screenshots: $(ls $OUT/*.png 2>/dev/null | wc -l)"

      - name: Dump Tripsy container
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          OUT="/tmp/artifacts/tripsy-container"
          mkdir -p "$OUT"
          CONTAINER=$(xcrun simctl get_app_container "$SIM_ID" "app.tripsy.ios" data 2>/dev/null || echo "")
          if [ -n "$CONTAINER" ]; then
            find "$CONTAINER/Library/Preferences" -name "*.plist" 2>/dev/null | while read f; do
              name=$(basename "$f")
              plutil -convert json "$f" -o "$OUT/${name}.json" 2>/dev/null || cp "$f" "$OUT/$name"
            done
            find "$CONTAINER" -name "*.sqlite*" 2>/dev/null -exec cp {} "$OUT/" \;
            find "$CONTAINER" -type f 2>/dev/null | sed "s|$CONTAINER/||" > "$OUT/file_tree.txt"
            echo "Container: $(wc -l < $OUT/file_tree.txt) files"
          else
            echo "No container"
          fi

      # ─── WANDERLOG ─────────────────────────────────────────────────────────

      - name: Extract + patch Wanderlog IPA
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          cd /tmp/ipas
          unzip -q "Wanderlog_v2.208.ipa" -d wanderlog_app
          WL_APP=$(find /tmp/ipas/wanderlog_app/Payload -name "*.app" -maxdepth 1 -type d)
          echo "WL_APP=$WL_APP" >> $GITHUB_ENV
          APP_NAME=$(basename "$WL_APP" .app)

          xcrun simctl terminate "$SIM_ID" "app.tripsy.ios" 2>/dev/null || true
          sleep 2

          rm -rf "$WL_APP/PlugIns" "$WL_APP/Extensions" 2>/dev/null || true

          cat > /tmp/sim_ents_wl.plist << 'ENTSEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
              <key>get-task-allow</key><true/>
              <key>com.apple.security.get-task-allow</key><true/>
          </dict></plist>
          ENTSEOF

          patch_macho() {
            local f="$1"
            if file "$f" 2>/dev/null | grep -qE "Mach-O (64-bit )?executable|Mach-O (64-bit )?dynamically linked"; then
              vtool -set-build-version iossimulator 16.0 16.0 -replace -output "${f}.sim" "$f" 2>/dev/null \
                && mv "${f}.sim" "$f" && echo "vtool ok: $(basename $f)" \
                || echo "vtool skip: $(basename $f)"
            fi
          }
          patch_macho "$WL_APP/$APP_NAME"
          find "$WL_APP/Frameworks" -type f 2>/dev/null | while read f; do patch_macho "$f"; done

          find "$WL_APP/Frameworks" -maxdepth 2 -type f -exec codesign --remove-signature {} \; 2>/dev/null || true
          codesign --remove-signature "$WL_APP/$APP_NAME" 2>/dev/null || true
          codesign --remove-signature "$WL_APP" 2>/dev/null || true
          find "$WL_APP/Frameworks" -maxdepth 1 \( -name "*.framework" -o -name "*.dylib" \) | while read fw; do
            codesign -f -s - "$fw" 2>/dev/null && echo "signed: $(basename $fw)" || echo "sign-fail: $(basename $fw)"
          done
          codesign -f -s - --entitlements /tmp/sim_ents_wl.plist "$WL_APP"
          xcrun simctl install "$SIM_ID" "$WL_APP"
          echo "Wanderlog installed"

      - name: Launch Wanderlog + run Maestro flow
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          BUNDLE_ID="com.wanderlog.ios"
          OUT="/tmp/artifacts/wanderlog-screenshots"
          mkdir -p "$OUT"

          echo "Launching Wanderlog..."
          xcrun simctl launch "$SIM_ID" "$BUNDLE_ID" 2>&1 || true
          # RN/Hermes app needs longer to load JS bundle
          sleep 22

          xcrun simctl io "$SIM_ID" screenshot "$OUT/00_launch_raw.png" 2>/dev/null || true

          python3 << 'PYEOF'
flow = """appId: com.wanderlog.ios
---
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: wanderlog_01_loaded

- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd

- takeScreenshot: wanderlog_02_permissions_done

- runFlow:
    when:
      visible: "Get started"
    commands:
      - tapOn: "Get started"
      - waitForAnimationToEnd:
          timeout: 5000
      - takeScreenshot: wanderlog_03_after_getstarted

- runFlow:
    when:
      visible: "Get Started"
    commands:
      - tapOn: "Get Started"
      - waitForAnimationToEnd:
          timeout: 5000
      - takeScreenshot: wanderlog_03b_after_getstarted

- repeat:
    times: 8
    commands:
      - runFlow:
          when:
            visible: "Next"
          commands:
            - tapOn: "Next"
            - waitForAnimationToEnd:
                timeout: 3000
            - takeScreenshot: wanderlog_slide_next
      - runFlow:
          when:
            visible: "Continue"
          commands:
            - tapOn: "Continue"
            - waitForAnimationToEnd:
                timeout: 3000
            - takeScreenshot: wanderlog_slide_continue
      - runFlow:
          when:
            visible: "NEXT"
          commands:
            - tapOn: "NEXT"
            - waitForAnimationToEnd:
                timeout: 3000
            - takeScreenshot: wanderlog_slide_NEXT

- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
      - waitForAnimationToEnd
      - takeScreenshot: wanderlog_skip

- runFlow:
    when:
      visible: "Maybe later"
    commands:
      - tapOn: "Maybe later"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Not now"
    commands:
      - tapOn: "Not now"
      - waitForAnimationToEnd

- takeScreenshot: wanderlog_04_post_onboarding

- runFlow:
    when:
      visible: "Trips"
    commands:
      - tapOn: "Trips"
      - waitForAnimationToEnd:
          timeout: 3000
      - takeScreenshot: wanderlog_05_trips

- runFlow:
    when:
      visible: "Explore"
    commands:
      - tapOn: "Explore"
      - waitForAnimationToEnd:
          timeout: 3000
      - takeScreenshot: wanderlog_06_explore

- runFlow:
    when:
      visible: "Profile"
    commands:
      - tapOn: "Profile"
      - waitForAnimationToEnd:
          timeout: 3000
      - takeScreenshot: wanderlog_07_profile

- runFlow:
    when:
      visible: "Budget"
    commands:
      - tapOn: "Budget"
      - waitForAnimationToEnd:
          timeout: 3000
      - takeScreenshot: wanderlog_08_budget

- takeScreenshot: wanderlog_09_final
"""
with open("/tmp/maestro/wanderlog_flow.yaml", "w") as f:
    f.write(flow)
print("Wanderlog flow written")
PYEOF

          maestro --device "$SIM_ID" test /tmp/maestro/wanderlog_flow.yaml \
            2>&1 | tee "$OUT/maestro_log.txt" || true

          MAESTRO_OUT=$(ls -td ~/.maestro/tests/*/ 2>/dev/null | head -1)
          if [ -n "$MAESTRO_OUT" ]; then
            find "$MAESTRO_OUT" -name "*.png" -exec cp {} "$OUT/" \; 2>/dev/null || true
          fi

          echo "Total screenshots: $(ls $OUT/*.png 2>/dev/null | wc -l)"

      - name: Dump Wanderlog container
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          OUT="/tmp/artifacts/wanderlog-container"
          mkdir -p "$OUT"
          CONTAINER=$(xcrun simctl get_app_container "$SIM_ID" "com.wanderlog.ios" data 2>/dev/null || echo "")
          if [ -n "$CONTAINER" ]; then
            find "$CONTAINER/Library/Preferences" -name "*.plist" 2>/dev/null | while read f; do
              name=$(basename "$f")
              plutil -convert json "$f" -o "$OUT/${name}.json" 2>/dev/null || cp "$f" "$OUT/$name"
            done
            find "$CONTAINER" -name "*.sqlite*" 2>/dev/null -exec cp {} "$OUT/" \;
            find "$CONTAINER" -type f 2>/dev/null | sed "s|$CONTAINER/||" > "$OUT/file_tree.txt"
            echo "Wanderlog container: $(wc -l < $OUT/file_tree.txt) files"
          else
            echo "No container"
          fi

      # ─── NETWORK CAPTURE ───────────────────────────────────────────────────

      - name: Setup mitmproxy
        run: |
          pip3 install mitmproxy --quiet --break-system-packages 2>&1 | tail -3
          mkdir -p /tmp/artifacts/network
          mitmdump -p 8889 --set block_global=false &
          MPID=$!; sleep 8; kill $MPID 2>/dev/null || true
          xcrun simctl keychain "${{ env.SIM_ID }}" add-root-cert ~/.mitmproxy/mitmproxy-ca-cert.pem
          echo "mitmproxy CA trusted"

      - name: Build SSL kill-switch dylib
        run: |
          cat > /tmp/ssl_killswitch.m << 'CEOF'
          #include <Security/Security.h>
          Boolean SecTrustEvaluateWithError(SecTrustRef t, CFErrorRef *e) {
              if (e) *e = NULL; return true;
          }
          OSStatus SecTrustEvaluate(SecTrustRef t, SecTrustResultType *r) {
              if (r) *r = kSecTrustResultProceed; return 0;
          }
          CEOF
          SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          clang -arch arm64 -dynamiclib \
            -target arm64-apple-ios16.0-simulator \
            -isysroot "$SDK" \
            -framework Security \
            -o /tmp/ssl_killswitch.dylib \
            /tmp/ssl_killswitch.m 2>&1 \
          && echo "SSL kill-switch OK" || echo "Build failed — running without SSL bypass"

      - name: Capture Tripsy network traffic
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          xcrun simctl terminate "$SIM_ID" "app.tripsy.ios" 2>/dev/null || true
          sleep 2
          mitmdump -p 8888 --save-stream-file /tmp/artifacts/network/tripsy_traffic.mitm \
            --set block_global=false -q &
          MPID=$!; sleep 3
          DYLD_ARG=""
          [ -f /tmp/ssl_killswitch.dylib ] && DYLD_ARG="DYLD_INSERT_LIBRARIES=/tmp/ssl_killswitch.dylib"
          xcrun simctl launch --terminate-running-process "$SIM_ID" "app.tripsy.ios" \
            $DYLD_ARG \
            https_proxy=http://127.0.0.1:8888 \
            http_proxy=http://127.0.0.1:8888 2>&1 || true
          echo "Capturing 45s..."; sleep 45
          kill $MPID 2>/dev/null; sleep 2
          echo "Tripsy traffic: $(wc -c < /tmp/artifacts/network/tripsy_traffic.mitm 2>/dev/null || echo 0) bytes"

      - name: Capture Wanderlog network traffic
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          xcrun simctl terminate "$SIM_ID" "app.tripsy.ios" 2>/dev/null || true
          xcrun simctl terminate "$SIM_ID" "com.wanderlog.ios" 2>/dev/null || true
          sleep 2
          mitmdump -p 8888 --save-stream-file /tmp/artifacts/network/wanderlog_traffic.mitm \
            --set block_global=false -q &
          MPID=$!; sleep 3
          DYLD_ARG=""
          [ -f /tmp/ssl_killswitch.dylib ] && DYLD_ARG="DYLD_INSERT_LIBRARIES=/tmp/ssl_killswitch.dylib"
          xcrun simctl launch --terminate-running-process "$SIM_ID" "com.wanderlog.ios" \
            $DYLD_ARG \
            https_proxy=http://127.0.0.1:8888 \
            http_proxy=http://127.0.0.1:8888 2>&1 || true
          echo "Capturing 45s..."; sleep 45
          kill $MPID 2>/dev/null; sleep 2
          echo "Wanderlog traffic: $(wc -c < /tmp/artifacts/network/wanderlog_traffic.mitm 2>/dev/null || echo 0) bytes"

      - name: Parse network flows to JSON
        if: always()
        run: |
          python3 << 'PYEOF'
          import json, os
          def parse_flows(mitm_path, out_path):
              size = os.path.getsize(mitm_path) if os.path.exists(mitm_path) else 0
              print(f"{os.path.basename(mitm_path)}: {size} bytes")
              if size == 0:
                  with open(out_path, "w") as f: json.dump([], f)
                  return
              try:
                  from mitmproxy import io as mio, http
                  flows = []
                  with open(mitm_path, "rb") as f:
                      for flow in mio.FlowReader(f).stream():
                          if isinstance(flow, http.HTTPFlow):
                              req, resp = flow.request, flow.response
                              flows.append({
                                  "method": req.method, "url": req.pretty_url,
                                  "req_headers": dict(req.headers),
                                  "req_body": req.text[:3000] if req.content else None,
                                  "status": resp.status_code if resp else None,
                                  "resp_headers": dict(resp.headers) if resp else {},
                                  "resp_body": resp.text[:5000] if resp and resp.content else None,
                              })
                  with open(out_path, "w") as f: json.dump(flows, f, indent=2)
                  print(f"  -> {len(flows)} flows")
              except Exception as e:
                  print(f"  -> parse error: {e}")
                  with open(out_path, "w") as f: json.dump([], f)

          for fname in ["tripsy_traffic", "wanderlog_traffic"]:
              parse_flows(f"/tmp/artifacts/network/{fname}.mitm",
                          f"/tmp/artifacts/network/{fname}.json")
          PYEOF

      # ─── UPLOAD ────────────────────────────────────────────────────────────

      - name: List artifacts
        if: always()
        run: |
          echo "=== All artifacts ==="
          find /tmp/artifacts -type f | sort
          echo ""
          echo "Tripsy screenshots: $(ls /tmp/artifacts/tripsy-screenshots/*.png 2>/dev/null | wc -l)"
          echo "Wanderlog screenshots: $(ls /tmp/artifacts/wanderlog-screenshots/*.png 2>/dev/null | wc -l)"

      - name: Upload tripsy-dynamic
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tripsy-dynamic
          path: /tmp/artifacts/tripsy-*
          retention-days: 30

      - name: Upload wanderlog-dynamic
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wanderlog-dynamic
          path: /tmp/artifacts/wanderlog-*
          retention-days: 30

      - name: Upload network artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: network-capture
          path: /tmp/artifacts/network/
          retention-days: 30
