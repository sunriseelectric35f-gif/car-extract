name: Dynamic Analysis (iOS Simulator)

on:
  workflow_dispatch:

jobs:
  dynamic:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Download IPAs from release
        run: |
          mkdir -p /tmp/ipas
          gh release download v1.0-ipa --dir /tmp/ipas --pattern "*.ipa" 2>&1 || true
          ls -lh /tmp/ipas/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Select + boot simulator
        id: sim
        run: |
          SIM_ID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json,sys
          d=json.load(sys.stdin)['devices']
          for rt,devs in d.items():
              if 'iOS-17' in rt or 'iOS-18' in rt or 'iOS-16' in rt:
                  for dev in devs:
                      if 'iPhone' in dev['name'] and dev['isAvailable']:
                          print(dev['udid']); exit()
          " 2>/dev/null || echo "")
          if [ -z "$SIM_ID" ]; then
            SIM_ID=$(xcrun simctl list devices available | grep -E "iPhone [0-9]+ Pro" | grep -v Unavailable | tail -1 | sed 's/.*(\([A-Z0-9-]*\)).*/\1/')
          fi
          echo "SIM_ID=$SIM_ID" >> $GITHUB_ENV
          echo "Using simulator: $SIM_ID"
          xcrun simctl boot "$SIM_ID" 2>/dev/null || true
          for i in $(seq 1 60); do
            STATE=$(xcrun simctl list devices | grep "$SIM_ID" | grep -o "Booted" || echo "")
            [ "$STATE" = "Booted" ] && echo "Booted in ${i}s" && break
            sleep 2
          done

      - name: Patch + install Tripsy
        run: |
          cd /tmp/ipas
          TRIPSY_IPA=$(ls *.ipa | grep -i tripsy | head -1)
          echo "IPA: $TRIPSY_IPA"
          unzip -q "$TRIPSY_IPA" -d tripsy_app
          APP_PATH=$(find /tmp/ipas/tripsy_app/Payload -name "*.app" -maxdepth 1 -type d)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          APP_NAME=$(basename "$APP_PATH" .app)

          rm -rf "$APP_PATH/PlugIns" "$APP_PATH/Extensions" "$APP_PATH/Watch" 2>/dev/null || true

          # Python LC_MIN_VERSION_IPHONEOS → LC_MIN_VERSION_IOSSIMULATOR patcher
          echo "" \
            | base64 --decode > /tmp/patch_lc.py

          python3 /tmp/patch_lc.py "$APP_PATH/$APP_NAME"
          find "$APP_PATH/Frameworks" -type f 2>/dev/null | while read f; do
            python3 /tmp/patch_lc.py "$f" 2>/dev/null || true
          done

          # Nuke all stale code signatures completely
          find "$APP_PATH" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$APP_PATH" -name "*.mobileprovision" -delete 2>/dev/null || true

          # Sign frameworks bottom-up
          find "$APP_PATH/Frameworks" -maxdepth 1 \( -name "*.framework" -o -name "*.dylib" \) | while read fw; do
            perl -e 'alarm 15; exec @ARGV' -- codesign -f -s - "$fw" 2>/dev/null \
              && echo "signed: $(basename $fw)" || echo "sign-fail: $(basename $fw)"
          done

          # Write entitlements plist (Python avoids YAML heredoc issues)
          python3 -c "open('/tmp/sim_ents_tripsy.plist','w').write('<?xml version=\"1.0\" encoding=\"UTF-8\"?><!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\"><plist version=\"1.0\"><dict><key>get-task-allow</key><true/></dict></plist>')"

          # Sign the .app bundle (entitlements required for simulator launch)
          perl -e 'alarm 30; exec @ARGV' -- codesign -f -s - \
            --entitlements /tmp/sim_ents_tripsy.plist "$APP_PATH" 2>&1 || true
          codesign -vv "$APP_PATH" 2>&1 | tail -3 || true
          perl -e 'alarm 30; exec @ARGV' -- xcrun simctl install "${{ env.SIM_ID }}" "$APP_PATH" 2>&1 || true
          echo "Tripsy installed"

      - name: Screenshot Tripsy
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          OUT="/tmp/artifacts/tripsy-screenshots"
          mkdir -p "$OUT"
          xcrun simctl launch "$SIM_ID" "app.tripsy.ios" 2>&1 | tee "$OUT/launch.log" || true
          for i in 05 10 15 20 25 30 40 50; do
            sleep 5
            xcrun simctl io "$SIM_ID" screenshot "$OUT/tripsy_${i}s.png" 2>/dev/null || true
          done
          # grab crash logs
          find ~/Library/Logs/DiagnosticReports -name "Tripsy*" -newer /tmp/ipas/Tripsy.ipa 2>/dev/null \
            | head -3 | xargs -I{} cp {} "$OUT/" 2>/dev/null || true
          echo "Total: $(ls $OUT/*.png 2>/dev/null | wc -l) screenshots"

      - name: Patch + install Wanderlog
        run: |
          cd /tmp/ipas
          WL_IPA=$(ls *.ipa | grep -i wanderlog | head -1)
          echo "IPA: $WL_IPA"
          unzip -q "$WL_IPA" -d wl_app
          WL_APP=$(find /tmp/ipas/wl_app/Payload -name "*.app" -maxdepth 1 -type d)
          echo "WL_APP=$WL_APP" >> $GITHUB_ENV
          APP_NAME=$(basename "$WL_APP" .app)

          rm -rf "$WL_APP/PlugIns" "$WL_APP/Extensions" "$WL_APP/Watch" 2>/dev/null || true

          python3 /tmp/patch_lc.py "$WL_APP/$APP_NAME"
          find "$WL_APP/Frameworks" -type f 2>/dev/null | while read f; do
            python3 /tmp/patch_lc.py "$f" 2>/dev/null || true
          done

          # Nuke all stale code signatures completely
          find "$WL_APP" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$WL_APP" -name "*.mobileprovision" -delete 2>/dev/null || true

          # Sign frameworks bottom-up
          find "$WL_APP/Frameworks" -maxdepth 1 \( -name "*.framework" -o -name "*.dylib" \) | while read fw; do
            perl -e 'alarm 15; exec @ARGV' -- codesign -f -s - "$fw" 2>/dev/null \
              && echo "signed: $(basename $fw)" || echo "sign-fail: $(basename $fw)"
          done

          # Write entitlements plist
          python3 -c "open('/tmp/sim_ents_wl.plist','w').write('<?xml version=\"1.0\" encoding=\"UTF-8\"?><!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\"><plist version=\"1.0\"><dict><key>get-task-allow</key><true/></dict></plist>')"

          # Sign the .app bundle
          perl -e 'alarm 30; exec @ARGV' -- codesign -f -s - \
            --entitlements /tmp/sim_ents_wl.plist "$WL_APP" 2>&1 || true
          codesign -vv "$WL_APP" 2>&1 | tail -3 || true
          perl -e 'alarm 30; exec @ARGV' -- xcrun simctl install "$SIM_ID" "$WL_APP" 2>&1 || true
          echo "Wanderlog installed"

      - name: Screenshot Wanderlog
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          OUT="/tmp/artifacts/wanderlog-screenshots"
          mkdir -p "$OUT"
          xcrun simctl terminate "$SIM_ID" "app.tripsy.ios" 2>/dev/null || true
          sleep 2
          xcrun simctl launch "$SIM_ID" "com.wanderlog.ios" 2>&1 || true
          for i in 05 10 15 20 25 30 40 50; do
            sleep 5
            xcrun simctl io "$SIM_ID" screenshot "$OUT/wanderlog_${i}s.png" 2>/dev/null || true
            echo "screenshot at ${i}s"
          done
          echo "Total: $(ls $OUT/*.png 2>/dev/null | wc -l) screenshots"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: /tmp/artifacts/
          retention-days: 30
          if-no-files-found: warn
