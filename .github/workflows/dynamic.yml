name: Dynamic Analysis (iOS Simulator)
on:
  workflow_dispatch:

jobs:
  dynamic:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Download IPAs from release
        run: |
          gh release download v1.0-ipa --repo ${{ github.repository }} --dir /tmp/ipas
          ls -lh /tmp/ipas/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List available simulators
        run: xcrun simctl list devices available | grep -E "iPhone|iPad" | head -20

      - name: Boot iPhone 16 simulator
        run: |
          SIM_ID=$(xcrun simctl list devices available | grep "iPhone 16 " | grep -v "Plus\|Pro\|Max" | head -1 | grep -oE '[A-F0-9-]{36}')
          echo "SIM_ID=$SIM_ID" >> $GITHUB_ENV
          echo "Using simulator: $SIM_ID"
          xcrun simctl boot "$SIM_ID" || true
          xcrun simctl bootstatus "$SIM_ID" -b

      - name: Extract + install Tripsy
        run: |
          cd /tmp/ipas
          unzip -q Tripsy.ipa -d tripsy_app

          # Resign for simulator (ad-hoc) — strip signing, add simulator entitlements
          APP_PATH=$(find /tmp/ipas/tripsy_app/Payload -name "*.app" -maxdepth 1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "App: $APP_PATH"

          # Build fat/simulator binary if needed — app is ARM64 device only
          # macOS 15 on Apple Silicon can run ARM64 simulator directly
          codesign --remove-signature "$APP_PATH/Tripsy" 2>/dev/null || true
          codesign --remove-signature "$APP_PATH" 2>/dev/null || true

          # Remove PlugIns (extensions can't run in sim without device entitlements)
          rm -rf "$APP_PATH/PlugIns" || true

          # Ad-hoc sign
          codesign -f -s - "$APP_PATH/Frameworks/"* 2>/dev/null || true
          codesign -f -s - "$APP_PATH"

          # Install
          xcrun simctl install "$SIM_ID" "$APP_PATH"
          echo "Tripsy installed"

      - name: Extract color assets from Tripsy
        run: |
          APP_PATH="${{ env.APP_PATH }}"
          mkdir -p /tmp/artifacts/tripsy-colors

          # Dump full assetutil catalog first
          xcrun assetutil --info "$APP_PATH/Assets.car" > /tmp/artifacts/tripsy-colors/full_catalog.json 2>&1 || true
          echo "Full catalog size: $(wc -c < /tmp/artifacts/tripsy-colors/full_catalog.json) bytes"

          # Parse colors from full_catalog.json
          python3 << 'PYEOF'
          import json, sys
          with open("/tmp/artifacts/tripsy-colors/full_catalog.json") as f:
              content = f.read()
          try:
              data = json.loads(content)
          except Exception as e:
              print(f"Parse error: {e}")
              sys.exit(0)
          colors = [x for x in data if x.get("AssetType") == "Color"]
          print(f"Found {len(colors)} color entries")
          color_report = {}
          for c in colors:
              name = c.get("Name", "unknown")
              comps = c.get("Color", {}).get("components", {})
              space = c.get("Color", {}).get("colorspace", "srgb")
              appearance = c.get("Appearances", [{}])[0].get("Appearance", "Any")
              entry = {"space": space, "components": comps, "appearance": appearance, "raw": c}
              if name not in color_report:
                  color_report[name] = []
              color_report[name].append(entry)
          with open("/tmp/artifacts/tripsy-colors/colors.json", "w") as f:
              json.dump(color_report, f, indent=2)
          with open("/tmp/artifacts/tripsy-colors/colors.md", "w") as f:
              f.write("# Tripsy Color Palette\n\n")
              f.write(f"Total named colors: {len(color_report)}\n\n")
              for name, variants in sorted(color_report.items()):
                  f.write(f"## {name}\n")
                  for v in variants:
                      comps = v.get("components", {})
                      r = comps.get("red", comps.get("r", "?"))
                      g = comps.get("green", comps.get("g", "?"))
                      b = comps.get("blue", comps.get("b", "?"))
                      a = comps.get("alpha", comps.get("a", 1.0))
                      f.write(f"- **{v.get('appearance', 'Any')}** ({v.get('space', 'srgb')}): R={r} G={g} B={b} A={a}\n")
                  f.write("\n")
          print("Done writing colors.json and colors.md")
          PYEOF

      - name: Extract color assets from Wanderlog
        run: |
          cd /tmp/ipas
          unzip -q "Wanderlog_v2.208.ipa" -d wanderlog_app
          WL_APP=$(find /tmp/ipas/wanderlog_app/Payload -name "*.app" -maxdepth 1)
          echo "WL_APP=$WL_APP" >> $GITHUB_ENV

          mkdir -p /tmp/artifacts/wanderlog-colors
          xcrun assetutil --info "$WL_APP/Assets.car" > /tmp/artifacts/wanderlog-colors/full_catalog.json 2>&1 || true
          echo "Wanderlog catalog: $(wc -c < /tmp/artifacts/wanderlog-colors/full_catalog.json) bytes"

          python3 << 'PYEOF'
          import json, sys

          with open("/tmp/artifacts/wanderlog-colors/full_catalog.json") as f:
              content = f.read()
          try:
              data = json.loads(content)
          except:
              print("Could not parse wanderlog catalog")
              sys.exit(0)

          colors = [x for x in data if x.get("AssetType") == "Color"]
          print(f"Wanderlog colors found: {len(colors)}")

          color_report = {}
          for c in colors:
              name = c.get("Name", "unknown")
              comps = c.get("Color", {}).get("components", {})
              space = c.get("Color", {}).get("colorspace", "srgb")
              appearance = c.get("Appearances", [{}])[0].get("Appearance", "Any")
              if name not in color_report:
                  color_report[name] = []
              color_report[name].append({"space": space, "components": comps, "appearance": appearance})

          with open("/tmp/artifacts/wanderlog-colors/colors.json", "w") as f:
              json.dump(color_report, f, indent=2)

          with open("/tmp/artifacts/wanderlog-colors/colors.md", "w") as f:
              f.write("# Wanderlog Color Palette\n\n")
              f.write(f"Total named colors: {len(color_report)}\n\n")
              for name, variants in sorted(color_report.items()):
                  f.write(f"## {name}\n")
                  for v in variants:
                      comps = v.get("components", {})
                      r = comps.get("red", comps.get("r", "?"))
                      g = comps.get("green", comps.get("g", "?"))
                      b = comps.get("blue", comps.get("b", "?"))
                      a = comps.get("alpha", comps.get("a", 1.0))
                      f.write(f"- **{v.get('appearance','Any')}** ({v.get('space','srgb')}): R={r} G={g} B={b} A={a}\n")
                  f.write("\n")
          print("Done")
          PYEOF

      - name: Launch Tripsy in simulator + screenshot all screens
        run: |
          APP_PATH="${{ env.APP_PATH }}"
          SIM_ID="${{ env.SIM_ID }}"
          mkdir -p /tmp/artifacts/tripsy-screenshots

          # Open simulator UI
          open -a Simulator

          # Launch Tripsy
          BUNDLE_ID="app.tripsy.ios"
          xcrun simctl launch "$SIM_ID" "$BUNDLE_ID" 2>&1 || {
            echo "Launch failed — trying to install+launch fresh"
            # Re-extract + resign without PlugIns
            APP_PATH_FRESH=$(find /tmp/ipas/tripsy_app/Payload -name "*.app" -maxdepth 1)
            codesign -f -s - "$APP_PATH_FRESH"
            xcrun simctl install "$SIM_ID" "$APP_PATH_FRESH"
            xcrun simctl launch "$SIM_ID" "$BUNDLE_ID"
          }

          sleep 5
          xcrun simctl io "$SIM_ID" screenshot /tmp/artifacts/tripsy-screenshots/01_launch.png

          sleep 3
          xcrun simctl io "$SIM_ID" screenshot /tmp/artifacts/tripsy-screenshots/02_onboarding.png

          # Let app settle
          sleep 5
          xcrun simctl io "$SIM_ID" screenshot /tmp/artifacts/tripsy-screenshots/03_main.png

          echo "Screenshots captured"

      - name: Dump Tripsy app container (UserDefaults, CoreData, files)
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          mkdir -p /tmp/artifacts/tripsy-container

          BUNDLE_ID="app.tripsy.ios"
          sleep 2

          # Get container path
          CONTAINER=$(xcrun simctl get_app_container "$SIM_ID" "$BUNDLE_ID" data 2>/dev/null || echo "")
          echo "Container: $CONTAINER"

          if [ -n "$CONTAINER" ]; then
            # UserDefaults
            find "$CONTAINER/Library/Preferences" -name "*.plist" 2>/dev/null | while read f; do
              name=$(basename "$f")
              plutil -convert json "$f" -o "/tmp/artifacts/tripsy-container/${name}.json" 2>/dev/null || cp "$f" "/tmp/artifacts/tripsy-container/$name"
            done

            # CoreData sqlite
            find "$CONTAINER" -name "*.sqlite*" 2>/dev/null | while read f; do
              cp "$f" "/tmp/artifacts/tripsy-container/" 2>/dev/null
            done

            # List all files
            find "$CONTAINER" -type f 2>/dev/null | sed "s|$CONTAINER/||" > /tmp/artifacts/tripsy-container/file_tree.txt
            echo "Container tree saved ($(wc -l < /tmp/artifacts/tripsy-container/file_tree.txt) files)"
          else
            echo "No container found (app may not have launched)"
          fi

      - name: Capture Tripsy network traffic via proxy
        run: |
          SIM_ID="${{ env.SIM_ID }}"
          mkdir -p /tmp/artifacts/tripsy-network

          # Use mitmproxy to capture traffic
          pip3 install mitmproxy --quiet 2>/dev/null || pip install mitmproxy --quiet

          # Set simulator proxy
          xcrun simctl keychain "$SIM_ID" add-root-cert ~/.mitmproxy/mitmproxy-ca-cert.pem 2>/dev/null || true

          # Start mitmdump in background
          mitmdump -p 8888 --save-stream-file /tmp/artifacts/tripsy-network/traffic.mitm \
            --set flow_detail=3 -q &
          MITM_PID=$!
          echo "mitmproxy PID: $MITM_PID"

          # Point simulator at proxy
          # Network proxy for simulator via environment
          defaults write com.apple.CoreSimulator SimulatorHTTPProxy "http://127.0.0.1:8888" 2>/dev/null || true

          BUNDLE_ID="app.tripsy.ios"
          xcrun simctl launch "$SIM_ID" "$BUNDLE_ID" || true
          sleep 20

          kill $MITM_PID 2>/dev/null || true

          # Convert to readable JSON
          mitmdump -r /tmp/artifacts/tripsy-network/traffic.mitm \
            --set flow_detail=2 -q 2>/dev/null | head -1000 > /tmp/artifacts/tripsy-network/traffic.txt || true

          echo "Network capture done"

      - name: Extract Tripsy CoreData schema via sqlite
        run: |
          mkdir -p /tmp/artifacts/tripsy-db
          # Check container for sqlite files
          SIM_ID="${{ env.SIM_ID }}"
          BUNDLE_ID="app.tripsy.ios"
          CONTAINER=$(xcrun simctl get_app_container "$SIM_ID" "$BUNDLE_ID" data 2>/dev/null || echo "")

          if [ -n "$CONTAINER" ]; then
            find "$CONTAINER" -name "*.sqlite" 2>/dev/null | while read db; do
              name=$(basename "$db")
              echo "=== Schema: $name ===" >> /tmp/artifacts/tripsy-db/schema.sql
              sqlite3 "$db" ".schema" >> /tmp/artifacts/tripsy-db/schema.sql 2>/dev/null || true
              echo "=== Tables: $name ===" >> /tmp/artifacts/tripsy-db/schema.sql
              sqlite3 "$db" ".tables" >> /tmp/artifacts/tripsy-db/schema.sql 2>/dev/null || true
            done
          fi

      - name: Upload tripsy artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tripsy-dynamic
          path: /tmp/artifacts/tripsy-*
          retention-days: 30

      - name: Upload wanderlog artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wanderlog-dynamic
          path: /tmp/artifacts/wanderlog-*
          retention-days: 30
